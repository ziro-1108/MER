services:
  mysql:
    image: mysql:8.4
    container_name: pptx-factory-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: pptx_factory
      MYSQL_USER: pptx_user
      MYSQL_PASSWORD: pptx_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

volumes:
  mysql-data:
